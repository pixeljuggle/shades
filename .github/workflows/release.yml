name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release versions
        run: |
          node <<'EOF'
          const fs = require('fs')
          const tag = process.env.GITHUB_REF_NAME.replace(/^v/, '')
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')).version
          const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8')).version

          if (pkg !== manifest) {
            console.error(`package.json version ${pkg} does not match manifest.json version ${manifest}`)
            process.exit(1)
          }

          if (tag !== pkg) {
            console.error(`tag version ${tag} does not match package.json version ${pkg}`)
            process.exit(1)
          }

          console.log(`Verified release version ${tag}`)
          EOF

      - name: Build extension
        run: npm run build

      - name: Verify build output
        run: |
          test -d shades-ext
          test -f shades-ext/manifest.json

      - name: Create release archive
        run: |
          zip_name="shades-ext-${GITHUB_REF_NAME}.zip"
          zip -r "$zip_name" shades-ext
          echo "ZIP_NAME=$zip_name" >> "$GITHUB_ENV"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ env.ZIP_NAME }}
