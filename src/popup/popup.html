<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shades</title>
  <link rel="stylesheet" href="./popup.css" />
</head>

<body>
  <div class="app">
    <section class="themes">
      <button class="theme-btn" data-theme="default" aria-label="Default theme">
        <span class="swatch swatch--default" id="icon-default"></span>
        <span class="label">Default</span>
      </button>
      <button class="theme-btn" data-theme="dark" aria-label="Dark theme">
        <span class="swatch swatch--dark" id="icon-dark"></span>
        <span class="label">Dark</span>
      </button>
      <button class="theme-btn" data-theme="sepia" aria-label="Sepia theme">
        <span class="swatch swatch--sepia" id="icon-sepia"></span>
        <span class="label">Sepia</span>
      </button>
      <button class="theme-btn" data-theme="night" aria-label="Night theme">
        <span class="swatch swatch--night" id="icon-night"></span>
        <span class="label">Night</span>
      </button>
      <button class="theme-btn" data-theme="custom" aria-label="Custom theme">
        <span class="swatch swatch--custom" id="icon-custom"></span>
        <span class="label">Custom</span>
      </button>
    </section>

    <section class="custom-panel" id="customPanel" hidden>

      <!-- Presets -->
      <div class="presets-section">
        <h2>Presets</h2>
        <div class="presets-row" id="presetsRow"></div>
        <div class="save-preset-row">
          <input type="text" id="presetNameInput" class="preset-name-input" placeholder="Name this preset…" maxlength="24" />
          <button id="savePresetBtn" class="save-preset-btn">Save</button>
        </div>
      </div>

      <hr class="divider" />

      <!-- Sliders -->
      <h2>Filters</h2>

      <div class="slider-row">
        <label for="sliderBrightness">
          <span>Brightness</span><span id="valBrightness" class="slider-val">100</span>
        </label>
        <input type="range" id="sliderBrightness" min="0" max="200" step="1" value="100" />
      </div>

      <div class="slider-row">
        <label for="sliderContrast">
          <span>Contrast</span><span id="valContrast" class="slider-val">100</span>
        </label>
        <input type="range" id="sliderContrast" min="0" max="200" step="1" value="100" />
      </div>

      <div class="slider-row">
        <label for="sliderSepia">
          <span>Sepia</span><span id="valSepia" class="slider-val">0</span>
        </label>
        <input type="range" id="sliderSepia" min="0" max="100" step="1" value="0" />
      </div>

      <div class="slider-row">
        <label for="sliderHueRotate">
          <span>Hue Rotate</span><span id="valHueRotate" class="slider-val">0</span>
        </label>
        <input type="range" id="sliderHueRotate" min="0" max="360" step="1" value="0" />
      </div>

      <div class="slider-row">
        <label for="sliderInvert">
          <span>Invert</span><span id="valInvert" class="slider-val">0</span>
        </label>
        <input type="range" id="sliderInvert" min="0" max="100" step="1" value="0" />
      </div>

      <div class="slider-row">
        <label for="sliderSaturate">
          <span>Saturate</span><span id="valSaturate" class="slider-val">100</span>
        </label>
        <input type="range" id="sliderSaturate" min="0" max="200" step="1" value="100" />
      </div>

      <div class="slider-row">
        <label for="sliderGrayscale">
          <span>Grayscale</span><span id="valGrayscale" class="slider-val">0</span>
        </label>
        <input type="range" id="sliderGrayscale" min="0" max="100" step="1" value="0" />
      </div>

      <button class="reset-btn" id="resetBtn">Reset</button>

      <hr class="divider" />

      <!-- Toggles -->
      <label class="toggle-row">
        <span class="toggle-label">
          <span class="toggle-title">Re-invert images &amp; video</span>
          <span class="toggle-hint">Keeps media looking natural when Invert is on</span>
        </span>
        <input type="checkbox" id="reinvertMedia" class="toggle-checkbox" />
      </label>

      <label class="toggle-row">
        <span class="toggle-label">
          <span class="toggle-title">Smooth transitions</span>
          <span class="toggle-hint">Fades filter changes instead of snapping</span>
        </span>
        <input type="checkbox" id="smoothTransition" class="toggle-checkbox" />
      </label>

    </section>
  </div>
  <script type="module" src="./popup.ts"></script>
</body>

</html>
